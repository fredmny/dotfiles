unbind r

bind r source-file ~/.tmux.conf

# Set prefix to C-b on homelab, C-Space elsewhere
if-shell 'grep -iq "homelab" /etc/hostname' \
    'set-option -g prefix C-b; bind-key C-b send-prefix' \
    'unbind-key C-b; set-option -g prefix C-Space; bind-key C-Space send-prefix'

# Vim movement
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Session management bindings
# Fuzzy session switcher with fzf (if available)
bind-key C-f run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --layout=reverse --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^r rename ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-r:execute(~/.config/tmux/rename-session.sh {2..})+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# Quick session creation
bind-key N command-prompt -p "New session name:" "new-session -d -s '%%' -c ~"

# Rename current session
bind-key R command-prompt -I "#S" -p "Rename session to:" "rename-session -- '%%'"

# Kill current session and switch to previous
bind-key X confirm-before -p "Kill session #S? (y/n)" "run-shell 'tmux switch-client -n \\\; kill-session -t \"#S\"'"

# Create new session in current directory
bind-key C-n new-session -c "#{pane_current_path}"

# Direct session management (no prefix required)
# Alt-based bindings to avoid conflicts with other applications

# Direct session switcher - Alt+s
bind-key -n M-s choose-session

# Direct fuzzy session switcher - Alt+f (if fzf available)
bind-key -n M-f run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --layout=reverse --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^r rename ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-r:execute(~/.config/tmux/rename-session.sh {2..})+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# List all plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator' # also install this plugins in vim/neovim
set -g @plugin 'xamut/tmux-weather'
set -g @plugin 'catppuccin/tmux'
# private repo: full https url so git can use keychain credentials (tpm's short
# 'fredmny/tmux-agent-mgmt' form clones anonymously and only works once public)
set -g @plugin 'https://github.com/fredmny/tmux-agent-mgmt'
#set -g @plugin 'dracula/tmux'
#set -g @plugin 'tmux-resurrect'

# Weather plugin options
set-option -g @tmux-weather-format "%x+%t+%w"

# Catpuccin config
set -g @catppuccin_window_status_style "slanted"
set -g @catppuccin_window_number_position "left"

set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_text "#W"

set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"
 
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

# Newer catppuccin/tmux (v2.x) dropped @catppuccin_status_modules_right; it no
# longer builds status-right for you. Load it explicitly here (TPM's `run` at
# the bottom of this file runs too late) so @catppuccin_status_<module>
# variables exist, then build status-right ourselves.
run ~/.tmux/plugins/tmux/catppuccin.tmux

set -g status-left-length 40
set -g status-left ""
set -agF status-left "#{E:@catppuccin_status_session}"
set -ag status-left "  "

set -g status-right-length 60
set -g status-right ""
# Agent status (scripts/render-status.sh): just an icon + its own per-state
# colours, no catppuccin pill (the chip background clashed with its colours).
set -ag status-right "| 󰚩  "
set -agF status-right "#{l:#(/Users/fredwaldow/.tmux/plugins/tmux-agent-mgmt/scripts/render-status.sh)}"
set -ag status-right " |"
set -agF status-right "#{E:@catppuccin_status_load}"
set -agF status-right "#{E:@catppuccin_status_weather}"

## Dracula plugin configs
#set -g @dracula-show-powerline true
# set -g @dracula-fixed-location "Florianópolis"
#set -g @dracula-plugins "weather"
#set -g @dracula-show-flags true
#set -g @dracula-show-fahrenheit false
#set -g @dracula-show-left-icon session

set -g status-position top
set -g extended-keys on
set -g extended-keys-format csi-u

# Open new windows in the current directory
bind c new-window -c "#{pane_current_path}"
bind C command-prompt -p "Window name:" "new-window -c '#{pane_current_path}' -n '%%'"
# Open claude in a new window at index 9 (or 8, 7... if taken)
bind-key -n M-c run-shell "~/.config/tmux/open-claude.sh '#{pane_current_path}'"
# Open split windows at current path
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Last session switching
bind -N "last-session (via sesh) " L run-shell "sesh last"

# Popups
bind g display-popup -E -w 90% -h 90% -T "GitHub Dashboard" gh dash
bind t if-shell '[ "#{session_name}" = "scratch" ]' \
  'detach-client' \
  'display-popup -E -w 60% -h 60% -T " scratch" "tmux new-session -A -s scratch -c ~"'
bind n display-popup -E -w 80% -h 80% -T "Inbox" "$EDITOR $OBSIDIAN_VAULT/Inbox/inbox.md"
bind d display-popup -E -w 90% -h 90% -T "Lazydocker" lazydocker
bind f display-popup -E -w 80% -h 80% -T "Ranger" "ranger '#{pane_current_path}'"

# tmux-agent-mgmt options: agent jump popup on a bare Alt+a (no prefix)
set -g @agent-mgmt-key 'M-a'
set -g @agent-mgmt-key-table 'root'
# For nvim
set-option -sg escape-time 10
if-shell '! grep -iq "homelab" /etc/hostname' 'set-option -sa terminal-features ",xterm-termite:RGB"'

# Initialize tmux plugins manager (keep this line at the very bottom of tmux.conf
run '~/.tmux/plugins/tpm/tpm'
